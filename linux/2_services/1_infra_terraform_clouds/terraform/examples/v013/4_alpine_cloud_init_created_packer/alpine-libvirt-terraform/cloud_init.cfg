#cloud-config
hostname: ${hostname}
fqdn: ${fqdn}
manage_etc_hosts: true
users:
  - name: den
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin
    home: /home/den
    shell: /bin/ash
    lock_passwd: false
    ssh-authorized-keys:
      - ${file("/home/den/.ssh/id_rsa.pub")}
# only cert auth via ssh (console access can still login)
ssh_pwauth: false
disable_root: false
chpasswd:
  list: |
     den:den
  expire: False
#run apt upgrade
package_update: true
package_upgrade: true
#install packages
packages:
  - qemu-guest-agent
  - vim
runcmd:
  - echo den:den | chpasswd
# test of writing content
write_files:
  - content: |
      The quick brown fox jumped 
      over the lazy dog
    path: /root/test.txt

# written to /var/log/cloud-init-output.log
final_message: "The system is finall up, after $UPTIME seconds"
